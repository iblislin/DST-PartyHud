name: luacheck

on:
  push:
  pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run luacheck
        # Use the prebuilt luacheck image (luacheck on PATH, reads .luacheckrc).
        # Verified locally against this repo = 0 warnings / 0 errors.
        run: docker run --rm --entrypoint sh -v "$PWD":/code -w /code pipelinecomponents/luacheck:latest -c "luacheck ."
