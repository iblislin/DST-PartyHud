# StyLua config for the PartyHud DST mod (Lua 5.1).
# Enforced in CI by .github/workflows/stylua.yml (blocking format check).
# Keep this in sync with the pinned StyLua version downloaded in that workflow.

column_width = 120
line_endings = "Unix"
indent_type = "Spaces"
indent_width = 2
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
